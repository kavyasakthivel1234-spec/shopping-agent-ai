services:
  # ───────── BACKEND ─────────
  - type: web
    name: shopping-assistant-backend
    runtime: node
    region: singapore
    plan: free

    rootDir: shopping-assistant-agent/backend

    buildCommand: npm install
    startCommand: npm start

    healthCheckPath: /health

    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: https://shopping-assistant-frontend.onrender.com
      - key: DEBUG
        value: "false"
      - key: APP_VERSION
        value: "4.0.0"

    disk:
      name: data-store
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # ───────── FRONTEND ─────────
  - type: static-site
    name: shopping-assistant-frontend

    rootDir: shopping-assistant-agent/frontend

    buildCommand: npm install && npm run build
    publishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://shopping-assistant-backend.onrender.com