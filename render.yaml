# render.yaml
# -----------
# Render.com deployment configuration for the AI Shopping Assistant.
# Docs: https://render.com/docs/blueprint-spec

services:
  - type: web
    name: shopping-assistant-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: shopping-assistant-agent/backend
    buildCommand: npm install
    startCommand: npm start

    envVars:
      - key: GROQ_API_KEY
        sync: false            # set manually in the Render dashboard
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: ALLOWED_ORIGINS
        value: https://shopping-assistant-frontend.vercel.app
      - key: DEBUG
        value: "false"
      - key: APP_VERSION
        value: "4.0.0"

    # Persist the data/ directory across deploys so history & favourites
    # survive restarts (Render free tier: disk is ephemeral — upgrade to
    # keep data permanently)
    disk:
      name: data-store
      mountPath: /opt/render/project/src/data
      sizeGB: 1

  # ── Frontend (React/Vite) ──────────────────────────────────────────
  # Option A: deploy frontend as a Render static site
  - type: web
    name: shopping-assistant-frontend
    runtime: static
    rootDir: shopping-assistant-agent/frontend

    buildCommand: npm install && npm run build
    staticPublishPath: ./dist

    envVars:
      - key: VITE_API_URL
        value: https://shopping-assistant-backend.onrender.com

    routes:
      # SPA fallback — send all paths to index.html
      - type: rewrite
        source: /*
        destination: /index.html
