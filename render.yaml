services:

  - type: web
    name: shopping-assistant-api
    runtime: python
    pythonVersion: 3.12.10
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: SERP_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://shopping-assistant-frontend-bma0.onrender.com
      - key: APP_TITLE
        value: AI Shopping Assistant API
      - key: APP_VERSION
        value: "4.0.0"
      - key: DEBUG
        value: "false"
    disk:
      name: shopping-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1

  - type: static
    name: shopping-assistant-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://shopping-assistant-api-vhwh.onrender.com
