services:
  # ── 1. Python FastAPI Backend ──────────────────────────────────────────
  - type: web
    name: shopping-assistant-api
    runtime: python
    pythonVersion: 3.12.10
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: MODEL_NAME
        value: llama-3.3-70b-versatile
      - key: SERP_API_KEY
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: EMAIL_ADDRESS
        sync: false
      - key: EMAIL_PASSWORD
        sync: false
      - key: ALLOWED_ORIGINS
        value: https://shopping-assistant-frontend.onrender.com
      - key: FRONTEND_URL
        value: https://shopping-assistant-frontend.onrender.com
      - key: APP_TITLE
        value: AI Shopping Assistant API
      - key: APP_VERSION
        value: "4.0.0"
      - key: DEBUG
        value: "false"
    disk:
      name: shopping-data
      mountPath: /opt/render/project/src/backend/data
      sizeGB: 1

  # ── 2. React / Vite Frontend (Static Site) ─────────────────────────────
  - type: static
    name: shopping-assistant-frontend
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://shopping-assistant-api.onrender.com
